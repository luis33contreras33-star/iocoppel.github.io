<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ruleta Coppel</title>
  <style>
    :root{
      --blue:#0B4FB6;
      --blue2:#0A3F93;
      --yellow:#FFD400;
      --ink:#0b1b3a;
      --muted:#6c7a94;
      --bg:#f4f7ff;
      --card:#ffffff;
      --shadow: 0 18px 50px rgba(11,79,182,.18);
      --radius: 26px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(800px 380px at 50% -60px, rgba(11,79,182,.22), transparent 60%),
        radial-gradient(900px 420px at 110% 15%, rgba(255,212,0,.18), transparent 60%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color:var(--ink);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:18px 12px 26px;
    }
    .wrap{
      width:min(640px, 96vw);
    }

    /* Header */
    .hero{
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue2) 100%);
      color:#fff;
      border-radius: 30px;
      padding:18px 16px 16px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
      text-align:center;
    }
    .hero:before{
      content:"";
      position:absolute;
      inset:-120px -60px auto -60px;
      height:220px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.26), transparent 60%),
        radial-gradient(circle at 70% 40%, rgba(255,255,255,.14), transparent 62%);
      transform: rotate(-6deg);
    }
    .hero > *{ position:relative; }
    .tag{
      display:inline-flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      margin-bottom:10px;
      padding:6px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      font-weight:900;
      letter-spacing:.3px;
    }
    .dot{
      width:10px; height:10px;
      border-radius:50%;
      background: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255,212,0,.18);
    }
    h1{
      margin:0;
      font-weight:1000;
      line-height:1.12;
      font-size: clamp(22px, 4.9vw, 38px);
      text-wrap: balance;
    }
    .sub{
      margin-top:10px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background: rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.22);
      font-weight:900;
    }
    .pill strong{
      font-weight:1000;
      letter-spacing:.2px;
    }

    /* Main Card */
    .card{
      margin-top:16px;
      background: rgba(255,255,255,.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .card:before{
      /* patrón suave tipo premium (fuera de la ruleta no molesta) */
      content:"";
      position:absolute; inset:0;
      background-image:
        radial-gradient(rgba(11,79,182,.10) 1.1px, transparent 1.1px),
        radial-gradient(rgba(255,212,0,.10) 1.1px, transparent 1.1px);
      background-size: 28px 28px;
      background-position: 0 0, 14px 14px;
      opacity:.28;
      pointer-events:none;
    }
    .card > *{ position:relative; }

    .content{
      padding:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    /* Pointer */
    .pointer{
      width:0;height:0;
      border-left:16px solid transparent;
      border-right:16px solid transparent;
      border-top:30px solid var(--yellow);
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.14));
      transform: translateY(6px);
      z-index:5;
    }

    /* Wheel shell */
    .shell{
      width:min(520px, 92vw);
      aspect-ratio:1/1;
      position:relative;
      border-radius:50%;
      display:grid;
      place-items:center;
    }
    .outer-ring{
      position:absolute;
      inset:-12px;
      border-radius:50%;
      border: 18px solid var(--blue);
      box-shadow: 0 18px 40px rgba(0,0,0,.14);
      background: transparent;
    }
    .wheel{
      width:100%;
      height:100%;
      border-radius:50%;
      transform: rotate(0deg);
      transition: transform 3.35s cubic-bezier(.12,.78,.10,1);
      will-change: transform;
      position:relative;
    }
    .wheel svg{ width:100%; height:100%; display:block; border-radius:50%; background:#fff; }

    /* Center button */
    .center{
      position:absolute;
      width:42%;
      aspect-ratio:1/1;
      border-radius:50%;
      background: radial-gradient(circle at 30% 22%, #fff8c6 0%, var(--yellow) 42%, #ffcc00 100%);
      border: 12px solid var(--blue);
      box-shadow: 0 16px 30px rgba(0,0,0,.16);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      cursor:pointer;
      user-select:none;
      text-align:center;
    }
    .center .brand{
      padding:5px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.48);
      border:1px solid rgba(11,79,182,.22);
      font-weight:1000;
      color: var(--blue2);
      letter-spacing:.2px;
    }
    .center .cta{
      font-weight:1000;
      color: var(--blue2);
      line-height:1.04;
      font-size: clamp(18px, 4.5vw, 30px);
      letter-spacing:.4px;
    }

    .hint{
      margin-top:2px;
      color: var(--muted);
      font-weight:700;
      font-size: clamp(14px, 3.6vw, 18px);
    }

    .btn{
      margin-top:4px;
      background: var(--yellow);
      border:0;
      padding:14px 22px;
      font-size:22px;
      font-weight:1000;
      border-radius: 16px;
      color: var(--blue2);
      box-shadow: 0 14px 26px rgba(255,212,0,.30);
      cursor:pointer;
      transition: transform .08s ease;
    }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn[disabled]{ opacity:.6; cursor:not-allowed; }

    /* Result ticket */
    .result{
      width:100%;
      margin-top:10px;
      background: rgba(255,255,255,.95);
      border-radius: 22px;
      padding:14px;
      border: 2px dashed rgba(11,79,182,.28);
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .result .left{ min-width:0; }
    .result .lbl{
      font-weight:1000;
      letter-spacing:.9px;
      color:#5b6a84;
      margin-bottom:2px;
    }
    .result .val{
      font-weight:1000;
      font-size: clamp(18px, 4.6vw, 30px);
      color: var(--blue2);
      line-height:1.1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .badge{
      background: rgba(11,79,182,.08);
      border: 1px solid rgba(11,79,182,.18);
      color: var(--blue2);
      font-weight:1000;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
    }

    /* Overlay modal */
    .overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }
    .overlay.show{ display:flex; }
    .modal{
      width:min(560px, 94vw);
      background:#fff;
      border-radius: 22px;
      box-shadow: 0 22px 55px rgba(0,0,0,.22);
      overflow:hidden;
      position:relative;
    }
    .modal .top{
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue2) 100%);
      color:#fff;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .modal .top strong{ font-size:18px; }
    .close{
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.22);
      color:#fff;
      font-weight:1000;
      border-radius: 10px;
      padding:8px 10px;
      cursor:pointer;
    }
    .modal .body{ padding:16px; }
    .ticket{
      border: 2px dashed rgba(11,79,182,.32);
      border-radius: 18px;
      padding:14px;
      background: linear-gradient(180deg, rgba(255,212,0,.14) 0%, rgba(11,79,182,.05) 100%);
    }
    .ticket .small{
      font-weight:1000;
      color:#5b6a84;
      letter-spacing:.8px;
    }
    .ticket .big{
      margin-top:6px;
      font-size: clamp(22px, 5.2vw, 36px);
      font-weight:1000;
      color: var(--blue2);
      line-height:1.05;
    }
    .actions{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .ghost{
      flex:1;
      background:#fff;
      border:2px solid rgba(11,79,182,.18);
      color: var(--blue2);
      font-weight:1000;
      padding:12px 14px;
      border-radius: 14px;
      cursor:pointer;
    }
    .solid{
      flex:1;
      background: var(--yellow);
      border:0;
      color: var(--blue2);
      font-weight:1000;
      padding:12px 14px;
      border-radius: 14px;
      cursor:pointer;
    }

    /* Confetti */
    .confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:60;
    }
    .piece{
      position:absolute;
      width:10px; height:14px;
      border-radius:2px;
      opacity:.95;
      transform: translateY(-20px) rotate(0deg);
      animation: fall 1200ms linear forwards;
    }
    @keyframes fall{
      to{
        transform: translateY(calc(100vh + 40px)) rotate(520deg);
        opacity:1;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div class="tag"><span class="dot"></span> Dinámica de beneficios <strong>Coppel</strong></div>
      <h1>Tu confianza se recompensa.<br/>Gira y llévate tu beneficio.</h1>
      <div class="sub">
        <div class="pill">⭐ <strong>Coppel</strong> Premia tu visita</div>
        <div class="pill">🎯 Fácil • Rápido • Claro</div>
      </div>
    </div>

    <div class="card">
      <div class="content">
        <div class="pointer" aria-hidden="true"></div>

        <div class="shell">
          <div class="outer-ring" aria-hidden="true"></div>

          <div class="wheel" id="wheel">
            <svg viewBox="0 0 100 100" aria-label="Ruleta de premios">
              <g id="segments"></g>
              <circle cx="50" cy="50" r="25" fill="white" opacity=".92"></circle>
              <circle cx="50" cy="50" r="25" fill="none" stroke="rgba(11,79,182,.12)" stroke-width="2"></circle>
            </svg>

            <div class="center" id="centerBtn" title="Toca para girar">
              <div class="brand">Coppel</div>
              <div class="cta">¡GIRA<br/>AQUÍ!</div>
            </div>
          </div>
        </div>

        <div class="hint">Toca el centro para girar</div>
        <button class="btn" id="spinBtn">Girar Ruleta</button>

        <div class="result" id="resultBox">
          <div class="left">
            <div class="lbl">RESULTADO</div>
            <div class="val" id="resultText">—</div>
          </div>
          <div class="badge">¡Felicidades!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Resultado">
      <div class="top">
        <strong>Tu beneficio Coppel</strong>
        <button class="close" id="closeOverlay">Cerrar</button>
      </div>
      <div class="body">
        <div class="ticket">
          <div class="small">PREMIO OBTENIDO</div>
          <div class="big" id="modalPrize">—</div>
        </div>
        <div class="actions">
          <button class="ghost" id="spinAgain">Girar otra vez</button>
          <button class="solid" id="okBtn">Listo</button>
        </div>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    // ====== Premios (SIN CAMBIOS) ======
    const prizes = [
      "10% Dcto. Muebles y Ropa",
      "10% Dcto. Óptica",
      "10% Dcto. Muebles y Ropa",
      "10% Dcto. en tu próxima visita",
      "¡Doble oportunidad!",
      "10% Dcto. Óptica"
    ];

    // Colores alternados (azul / amarillo / blanco) para estilo Coppel
    const segColors = [
      { fill:"#0B4FB6", t1:"#ffffff", t2:"#ffffff" },
      { fill:"#FFD400", t1:"#0A3F93", t2:"#0A3F93" },
      { fill:"#ffffff", t1:"#0A3F93", t2:"#0A3F93" },
      { fill:"#FFD400", t1:"#0A3F93", t2:"#0A3F93" },
      { fill:"#0B4FB6", t1:"#ffffff", t2:"#ffffff" },
      { fill:"#ffffff", t1:"#0A3F93", t2:"#0A3F93" }
    ];

    const wheel = document.getElementById("wheel");
    const spinBtn = document.getElementById("spinBtn");
    const centerBtn = document.getElementById("centerBtn");
    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");

    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const closeOverlay = document.getElementById("closeOverlay");
    const okBtn = document.getElementById("okBtn");
    const spinAgain = document.getElementById("spinAgain");
    const confettiWrap = document.getElementById("confetti");

    // ====== Construir SVG (6 segmentos) ======
    const g = document.getElementById("segments");
    const N = prizes.length;
    const step = 360 / N;

    function polar(cx, cy, r, deg){
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }
    function arcPath(cx, cy, r, startDeg, endDeg){
      const s = polar(cx, cy, r, startDeg);
      const e = polar(cx, cy, r, endDeg);
      const large = (endDeg - startDeg) > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y} Z`;
    }

    // Convierte cada premio en 2 líneas MUY legibles (línea 1 grande)
    function labelLines(prize){
      // Casos especiales para máxima legibilidad
      if(prize.includes("Muebles y Ropa")) return ["10% Dcto.", "Muebles y Ropa"];
      if(prize.includes("Óptica")) return ["10% Dcto.", "Óptica"];
      if(prize.includes("próxima visita")) return ["10% Dcto.", "Próxima visita"];
      if(prize.includes("Doble oportunidad")) return ["¡Doble", "oportunidad!"];
      // fallback
      const words = prize.split(" ");
      const mid = Math.ceil(words.length/2);
      return [words.slice(0, mid).join(" "), words.slice(mid).join(" ")];
    }

    for(let i=0;i<N;i++){
      const start = i * step;
      const end = (i+1) * step;

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", arcPath(50, 50, 48, start, end));
      path.setAttribute("fill", segColors[i].fill);
      g.appendChild(path);

      const mid = start + step/2;
      const rText = 33;
      const p = polar(50,50,rText, mid);

      const [l1, l2] = labelLines(prizes[i]);

      // Línea 1 (grande)
      const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t1.setAttribute("x", p.x.toFixed(2));
      t1.setAttribute("y", p.y.toFixed(2));
      t1.setAttribute("fill", segColors[i].t1);
      t1.setAttribute("font-weight", "1000");
      t1.setAttribute("font-size", "7.2");
      t1.setAttribute("text-anchor", "middle");
      t1.setAttribute("transform", `rotate(${mid} ${p.x.toFixed(2)} ${p.y.toFixed(2)})`);
      t1.textContent = l1;

      // Línea 2 (un poco más chica)
      const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t2.setAttribute("x", p.x.toFixed(2));
      t2.setAttribute("y", p.y.toFixed(2));
      t2.setAttribute("fill", segColors[i].t2);
      t2.setAttribute("font-weight", "900");
      t2.setAttribute("font-size", "6.2");
      t2.setAttribute("text-anchor", "middle");
      t2.setAttribute("transform", `rotate(${mid} ${p.x.toFixed(2)} ${p.y.toFixed(2)}) translate(0 7.6)`);
      t2.textContent = l2;

      g.appendChild(t1);
      g.appendChild(t2);
    }

    // ====== Spin logic ======
    let spinning = false;
    let rotation = 0;

    function spin(){
      if(spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      centerBtn.style.pointerEvents = "none";

      const idx = Math.floor(Math.random() * N);
      const targetMid = idx * step + step/2;
      const base = (360 - targetMid);
      const extraTurns = 6 * 360;
      const jitter = (Math.random() * 6) - 3;
      rotation = rotation + extraTurns + base + jitter;

      wheel.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        showResult(prizes[idx]);
        spinning = false;
        spinBtn.disabled = false;
        centerBtn.style.pointerEvents = "auto";
      }, 3400);
    }

    function showResult(prize){
      resultText.textContent = prize;
      resultBox.style.display = "flex";
      modalPrize.textContent = prize;
      overlay.classList.add("show");
      burstConfetti();
    }

    function closeModal(){
      overlay.classList.remove("show");
    }

    function burstConfetti(){
      confettiWrap.innerHTML = "";
      const colors = ["#0B4FB6", "#FFD400", "#ffffff", "#0A3F93"];
      const count = 80;
      for(let i=0;i<count;i++){
        const p = document.createElement("div");
        p.className = "piece";
        const w = 6 + Math.random()*8;
        const h = 8 + Math.random()*10;
        p.style.width = w + "px";
        p.style.height = h + "px";
        p.style.left = (Math.random()*100) + "vw";
        p.style.top = (-20 - Math.random()*80) + "px";
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDuration = (900 + Math.random()*900) + "ms";
        p.style.animationDelay = (Math.random()*140) + "ms";
        confettiWrap.appendChild(p);
      }
      setTimeout(() => { confettiWrap.innerHTML = ""; }, 1800);
    }

    spinBtn.addEventListener("click", spin);
    centerBtn.addEventListener("click", spin);

    closeOverlay.addEventListener("click", closeModal);
    okBtn.addEventListener("click", closeModal);
    overlay.addEventListener("click", (e) => { if(e.target === overlay) closeModal(); });

    spinAgain.addEventListener("click", () => {
      closeModal();
      setTimeout(spin, 120);
    });
  </script>
</body>
</html>
